<!DOCTYPE html>
<html>
<head>
<title>ESP32 Control</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<h2>Điều khiển ESP32</h2>

<button onclick="bat()">BẬT</button>
<button onclick="tat()">TẮT</button>

<script>

const client = mqtt.connect("wss://58526a444969487488b14adcb20bbfac.s1.eu.hivemq.cloud:8884/mqtt",{
username:"esp32",
password:"12345678"
})

client.on("connect",function(){
console.log("MQTT Connected")
})

function bat(){
client.publish("home/test","ON")
}

function tat(){
client.publish("home/test","OFF")
}

</script>

</body>
</html>
