<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ESP32 Smart Home</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h2{
margin-top:40px;
}

.box{
margin:20px auto;
width:300px;
background:#222;
padding:20px;
border-radius:10px;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
transition:.4s;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
transition:.4s;
border-radius:50%;
}

input:checked + .slider{
background:#00ff7f;
}

input:checked + .slider:before{
transform:translateX(26px);
}

</style>
</head>

<body>

<h2>ESP32 SMART HOME</h2>

<div class="box">
LED1
<label class="switch">
<input type="checkbox" onchange="led('home/led1',this)">
<span class="slider"></span>
</label>
</div>

<div class="box">
LED2
<label class="switch">
<input type="checkbox" onchange="led('home/led2',this)">
<span class="slider"></span>
</label>
</div>

<div class="box">
LED3
<label class="switch">
<input type="checkbox" onchange="led('home/led3',this)">
<span class="slider"></span>
</label>
</div>

<div class="box">
LED4
<label class="switch">
<input type="checkbox" onchange="led('home/led4',this)">
<span class="slider"></span>
</label>
</div>

<script>

const options = {
username:"Tson11",
password:"Quynhkhoi2026."
}

const client = mqtt.connect("wss://58526a444969487488b14adcb20bbfac.s1.eu.hivemq.cloud:8884/mqtt",options)

client.on("connect",function(){
console.log("MQTT Connected")
})

function led(topic,el){

if(el.checked){
client.publish(topic,"ON")
}else{
client.publish(topic,"OFF")
}

}

</script>

</body>
</html>
